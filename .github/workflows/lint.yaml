name: "Lint"

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: MensaCore/go.mod
          cache: true
          cache-dependency-path: MensaCore/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m
          working-directory: MensaCore

  go-build:
    name: go build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MensaCore
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: MensaCore/go.mod
          cache: true
          cache-dependency-path: MensaCore/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
